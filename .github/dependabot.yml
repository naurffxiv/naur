version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
    groups:
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "@typescript-eslint/*"
      npm-other:
        patterns: ["*"]
        exclude-patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "@typescript-eslint/*"

  - package-ecosystem: "npm"
    directory: "/services/naurffxiv"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
    groups:
      next-and-react:
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
          - "next-mdx-remote"
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "@typescript-eslint/*"
      npm-other:
        patterns: ["*"]
        exclude-patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
          - "next-mdx-remote"
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "@typescript-eslint/*"

  - package-ecosystem: "npm"
    directory: "/tests/e2e"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
    groups:
      npm-all:
        patterns: ["*"]

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
    groups:
      aspire:
        patterns:
          - "Aspire.*"
      opentelemetry:
        patterns:
          - "OpenTelemetry.*"
      nuget-other:
        patterns: ["*"]
        exclude-patterns:
          - "Aspire.*"
          - "OpenTelemetry.*"

  - package-ecosystem: "uv"
    directory: "/services/moddingway"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
    groups:
      uv:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/services/findingway"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
    groups:
      gomod-findingway:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/services/clearingway"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
    groups:
      gomod-clearingway:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
    groups:
      docker:
        patterns: ["*"]
