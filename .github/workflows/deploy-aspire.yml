name: Deploy Aspire

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment to deploy"
        required: true
        type: choice
        options: [production, development]
        default: production
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-aspire.yml"
      - "Directory.Packages.props"
      - "NuGet.config"
      - "global.json"
      - "services/apphost/**"
      - "services/authingway/**"

concurrency:
  group: aspire-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Service Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apphost: ${{ steps.filter.outputs.apphost }}
      authingway: ${{ steps.filter.outputs.authingway }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            _shared: &shared
              - '.github/workflows/deploy-aspire.yml'
              - 'Directory.Packages.props'
              - 'NuGet.config'
              - 'global.json'
            apphost:
              - *shared
              - 'services/apphost/**'
            authingway:
              - *shared
              - 'services/authingway/**'

  deploy:
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.apphost == 'true' ||
      needs.detect-changes.outputs.authingway == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
      url: https://${{ vars.DEPLOY_DOMAIN }}
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: services/apphost

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: zyactions/dotnet-setup@8f4b644ff5ff19bba913663df285b7b7278bb724 # v1.0.1
        with:
          global-json-file: global.json

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"
        working-directory: .

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add known host
        env:
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
        run: ssh-keyscan -H "$TARGET_HOST" >> ~/.ssh/known_hosts

      - uses: zyactions/dotnet-restore@bffc71e1a5275122a2795bf2912804f0185db27c # v1.1.0
        with:
          working-directory: services/apphost

      - name: Deploy
        env:
          EnableHttps: "true"
          Parameters__PostgresPassword: ${{ secrets.POSTGRES_PASSWORD }}
          Parameters__domain: ${{ vars.DEPLOY_DOMAIN }}
          Parameters__letsencrypt_email: ${{ vars.LETSENCRYPT_EMAIL }}
          DockerSSH__TargetHost: ${{ secrets.TARGET_HOST }}
          DockerSSH__SshUsername: ${{ secrets.SSH_USERNAME }}
          DockerSSH__SshKeyPath: ~/.ssh/id_ed25519
          DockerSSH__SshPassword: ${{ secrets.SSH_KEY_PASSPHRASE }}
          DockerRegistry__RegistryUrl: ghcr.io
          DockerRegistry__RepositoryPrefix: ${{ github.repository }}
          DockerRegistry__RegistryUsername: ${{ github.actor }}
          DockerRegistry__RegistryPassword: ${{ secrets.GITHUB_TOKEN }}
        run: aspire deploy -e ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
