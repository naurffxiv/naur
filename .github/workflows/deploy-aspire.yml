name: Deploy Aspire

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment to deploy"
        required: true
        type: choice
        options: [production, development]
        default: production
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-aspire.yml"
      - "Directory.Packages.props"
      - "NuGet.config"
      - "global.json"
      - "services/apphost/**"
      - "services/authingway/**"

concurrency:
  group: aspire-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Service Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apphost: ${{ steps.filter.outputs.apphost }}
      authingway: ${{ steps.filter.outputs.authingway }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            _shared: &shared
              - '.github/workflows/deploy-aspire.yml'
              - 'Directory.Packages.props'
              - 'NuGet.config'
              - 'global.json'
            apphost:
              - *shared
              - 'services/apphost/**'
            authingway:
              - *shared
              - 'services/authingway/**'

  deploy:
    needs: [detect-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.apphost == 'true' ||
      needs.detect-changes.outputs.authingway == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
      url: https://${{ vars.DEPLOY_DOMAIN }}
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: services/apphost

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: zyactions/dotnet-setup@8f4b644ff5ff19bba913663df285b7b7278bb724 # v1.0.1
        with:
          global-json-file: global.json

      - name: Install Aspire CLI
        run: curl -sSL https://aspire.dev/install.sh | bash

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.TARGET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          EnableHttps: "true"
          Parameters__PostgresPassword: ${{ secrets.POSTGRES_PASSWORD }}
          Parameters__Domain: ${{ vars.DEPLOY_DOMAIN }}
          Parameters__LetsEncryptEmail: ${{ vars.LETSENCRYPT_EMAIL }}
          DockerSSH__TargetHost: ${{ secrets.TARGET_HOST }}
          DockerSSH__SshUsername: ${{ secrets.SSH_USERNAME }}
          DockerRegistry__RegistryUrl: ghcr.io
          DockerRegistry__RepositoryPrefix: ${{ github.repository }}
          DockerRegistry__RegistryUsername: ${{ github.actor }}
          DockerRegistry__RegistryPassword: ${{ secrets.GITHUB_TOKEN }}
        run: aspire deploy -e ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
