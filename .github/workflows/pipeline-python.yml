name: Pipeline Python

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: "3.14"
      should_run:
        required: false
        type: boolean
        default: true
      has_docker_smoke_test:
        required: false
        type: boolean
        default: false

jobs:
  lint:
    if: inputs.should_run
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [format, lint]
      fail-fast: false
    defaults:
      run:
        working-directory: services/${{ inputs.service }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          enable-cache: true
          python-version: ${{ inputs.python-version }}
          cache-dependency-glob: "services/${{ inputs.service }}/uv.lock"

      - name: Install Linting Tools
        run: uv sync --frozen --only-group dev

      - name: Ruff Format
        if: matrix.check == 'format'
        uses: ./.github/actions/run-command-with-report
        with:
          service: ${{ inputs.service }}
          step-number: 10
          step-name: "Ruff Format"
          command: uv run ruff format --check . ../../tests/${{ inputs.service }}
          output-file: format.txt
          working-directory: services/${{ inputs.service }}

      - name: Ruff Lint
        if: matrix.check == 'lint'
        uses: ./.github/actions/run-command-with-report
        with:
          service: ${{ inputs.service }}
          step-number: 10
          step-name: "Ruff Lint"
          command: uv run ruff check --output-format=github . ../../tests/${{ inputs.service }}
          output-file: lint.txt
          working-directory: services/${{ inputs.service }}

  build:
    needs: [lint]
    if: inputs.should_run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/${{ inputs.service }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          enable-cache: true
          python-version: ${{ inputs.python-version }}
          cache-dependency-glob: "services/${{ inputs.service }}/uv.lock"

      - name: Install Dependencies
        run: uv sync --frozen --all-groups

      - name: Type Check
        uses: ./.github/actions/run-command-with-report
        with:
          service: ${{ inputs.service }}
          step-number: 20
          step-name: "Type Check"
          command: uv run ty check . ../../tests/${{ inputs.service }} --output-format=github
          working-directory: services/${{ inputs.service }}
          fail-on-error: true

  test:
    needs: [build]
    if: inputs.should_run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/${{ inputs.service }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          enable-cache: true
          python-version: ${{ inputs.python-version }}
          cache-dependency-glob: "services/${{ inputs.service }}/uv.lock"

      - name: Install Dependencies
        run: uv sync --frozen --all-groups

      - name: Unit Tests
        uses: ./.github/actions/run-command-with-report
        with:
          service: ${{ inputs.service }}
          step-number: 30
          step-name: "Unit Tests"
          command: uv run pytest ../../tests/${{ inputs.service }} --cov=${{ inputs.service }} --cov-report=xml:../../tests/${{ inputs.service }}/coverage.xml
          output-file: pytest.txt
          working-directory: services/${{ inputs.service }}
          fail-on-error: true

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ inputs.service }}
          path: tests/${{ inputs.service }}/coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  docker-smoke-test:
    needs: [test]
    if: inputs.should_run && inputs.has_docker_smoke_test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/${{ inputs.service }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build API Image
        run: docker compose build python-api

      - name: Smoke Test API
        env:
          POSTGRES_USER: moddingwayLocalDB
          POSTGRES_PASSWORD: moddingwayLocalDBPassword
          POSTGRES_DB: moddingway
          MODDINGWAY_ENVIRONMENT: local
        run: |
          docker compose up -d python-api-local

          for i in {1..60}; do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              docker compose logs python-api-local
              docker compose down
              exit 0
            fi
            echo "Waiting for API to be healthy..."
            sleep 2
          done

          echo "API failed health check within timeout"
          docker compose logs python-api-local
          docker compose logs postgres_local
          docker compose down
          exit 1
