# Root Prek Configuration
fail_fast: false

repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        priority: 1
      - id: end-of-file-fixer
        priority: 1
      - id: check-yaml
        priority: 1
      - id: check-json
        exclude: .*/tsconfig.json
        priority: 1
      - id: check-toml
        priority: 1
      - id: check-merge-conflict
        priority: 1
      - id: check-added-large-files
        args: [--maxkb=20000]
        priority: 1
      - id: detect-private-key
        priority: 1
      - id: mixed-line-ending
        args: [--fix=auto]
        priority: 1
